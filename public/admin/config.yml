backend:
  name: github
  repo: NPascu6/andrei-mylenses.ch
  branch: master
  base_url: https://andrei-mylenses-cms-oauth.vercel.app
  auth_endpoint: /auth
  site_domain: andrei-mylenses.ch

site_url: https://andrei-mylenses.ch
display_url: https://andrei-mylenses.ch
logo_url: /logo192.png
publish_mode: editorial_workflow
locale: en

media_folder: "src/assets/photos"
public_folder: "src/assets/photos"

collections:
  - name: "photos"
    label: "Portfolio Library"
    label_singular: "Portfolio Entry"
    folder: "src/content/photos"
    create: true
    delete: true
    slug: "{{slug}}"
    extension: "json"
    format: "json"
    identifier_field: "title"
    summary: "{{title}} · {{category}} · {{location}}"
    sortable_fields: ["title", "category", "location", "takenAt", "featured", "printReady"]
    view_filters:
      - label: "Featured only"
        field: "featured"
        pattern: true
      - label: "Print-ready only"
        field: "printReady"
        pattern: true
      - label: "Instagram imports"
        field: "category"
        pattern: "Instagram"
    editor:
      preview: false
    fields:
      - label: "Artwork Title"
        name: "title"
        widget: "string"
        hint: "Public-facing title shown in the gallery and fullscreen view."
      - label: "Photo File"
        name: "image"
        widget: "image"
        allow_multiple: false
        hint: "Upload a single image for this entry. Landscape and portrait both work."
      - label: "Description"
        name: "description"
        widget: "text"
        required: false
        hint: "Write 1-3 sentences that describe the scene, mood, or story behind the image."
      - label: "Location"
        name: "location"
        widget: "string"
        required: false
        hint: "Use a clean human-readable location, for example: Zurich, Switzerland."
      - label: "Category"
        name: "category"
        widget: "select"
        required: false
        default: "Travel"
        hint: "Used for gallery filtering on the public site."
        options:
          - { label: "Travel", value: "Travel" }
          - { label: "Nature", value: "Nature" }
          - { label: "Street", value: "Street" }
          - { label: "Wildlife", value: "Wildlife" }
          - { label: "Portrait", value: "Portrait" }
          - { label: "Architecture", value: "Architecture" }
          - { label: "Instagram", value: "Instagram" }
      - label: "Show as featured work"
        name: "featured"
        widget: "boolean"
        default: false
        required: false
        hint: "Turn this on if the image should be highlighted more prominently across the site."
      - label: "Available as print-ready work"
        name: "printReady"
        widget: "boolean"
        default: false
        required: false
        hint: "Turn this on for images that should support stronger print-focused messaging."
      - label: "Instagram or source link"
        name: "permalink"
        widget: "string"
        required: false
        hint: "Optional source URL, useful for Instagram imports or original post links."
      - label: "Date captured"
        name: "takenAt"
        widget: "datetime"
        required: false
        format: "YYYY-MM-DD"
        time_format: false
        date_format: "YYYY-MM-DD"
        hint: "Optional capture date shown in metadata when available."
  - name: "siteContent"
    label: "Site Content"
    delete: false
    editor:
      preview: false
    files:
      - label: "Portfolio Experience"
        name: "portfolioExperience"
        file: "src/content/site/portfolioExperience.json"
        format: "json"
        fields:
          - { label: "Eyebrow", name: "eyebrow", widget: "string" }
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Description", name: "description", widget: "text" }
          - { label: "Archive Eyebrow", name: "archiveEyebrow", widget: "string" }
          - { label: "Archive Title", name: "archiveTitle", widget: "string" }
      - label: "Inquiry Guide"
        name: "inquiryGuide"
        file: "src/content/site/inquiryGuide.json"
        format: "json"
        fields:
          - { label: "Eyebrow", name: "eyebrow", widget: "string" }
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Description", name: "description", widget: "text" }
          - { label: "Guided Title", name: "guidedTitle", widget: "string" }
          - { label: "Guided Description", name: "guidedDescription", widget: "text" }
      - label: "Curation"
        name: "curation"
        file: "src/content/site/curation.json"
        format: "json"
        fields:
          - label: "Featured Print Titles"
            name: "featuredPrintTitles"
            widget: "list"
            required: false
            hint: "Choose and reorder the works that should appear in the featured print strip."
            summary: "{{fields.artworkTitle}}"
            field:
              label: "Artwork"
              name: "artworkTitle"
              widget: "relation"
              collection: "photos"
              search_fields: ["title", "location", "category"]
              value_field: "{{title}}"
              display_fields: ["title", "location", "category"]
          - label: "Featured Archive Titles"
            name: "featuredArchiveTitles"
            widget: "list"
            required: false
            hint: "Optional ordered works for the top of the main archive view. The list order becomes the gallery order."
            summary: "{{fields.artworkTitle}}"
            field:
              label: "Artwork"
              name: "artworkTitle"
              widget: "relation"
              collection: "photos"
              search_fields: ["title", "location", "category"]
              value_field: "{{title}}"
              display_fields: ["title", "location", "category"]
