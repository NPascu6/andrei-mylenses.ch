backend:
  name: github
  repo: NPascu6/andrei-mylenses.ch
  branch: master
  base_url: https://andrei-mylenses-cms-oauth.vercel.app
  auth_endpoint: /auth
  site_domain: andrei-mylenses.ch

site_url: https://andrei-mylenses.ch
display_url: https://andrei-mylenses.ch
logo_url: /logo192.png
publish_mode: editorial_workflow
locale: en

media_folder: "src/assets/photos"
public_folder: "src/assets/photos"

collections:
  - name: "photos"
    label: "Portfolio Library"
    label_singular: "Portfolio Entry"
    folder: "src/content/photos"
    create: true
    delete: true
    slug: "{{slug}}"
    extension: "json"
    format: "json"
    identifier_field: "title"
    summary: "{{title}} · {{category}} · {{location}}"
    sortable_fields: ["title", "category", "location", "takenAt", "featured", "printReady", "hero"]
    view_filters:
      - label: "Featured only"
        field: "featured"
        pattern: true
      - label: "Print-ready only"
        field: "printReady"
        pattern: true
      - label: "Instagram imports"
        field: "category"
        pattern: "Instagram"
    editor:
      preview: false
    fields:
      - label: "Artwork Title"
        name: "title"
        widget: "string"
        hint: "Public-facing title shown in the gallery and fullscreen view."
      - label: "Photo File"
        name: "image"
        widget: "image"
        allow_multiple: false
        hint: "Upload a single image for this entry. Landscape and portrait both work."
      - label: "Description"
        name: "description"
        widget: "text"
        required: false
        hint: "Write 1-3 sentences that describe the scene, mood, or story behind the image."
      - label: "Location"
        name: "location"
        widget: "string"
        required: false
        hint: "Use a clean human-readable location, for example: Zurich, Switzerland."
      - label: "Category"
        name: "category"
        widget: "select"
        required: false
        default: "Travel"
        hint: "Used for gallery filtering on the public site."
        options:
          - { label: "Travel", value: "Travel" }
          - { label: "Nature", value: "Nature" }
          - { label: "Street", value: "Street" }
          - { label: "Wildlife", value: "Wildlife" }
          - { label: "Portrait", value: "Portrait" }
          - { label: "Architecture", value: "Architecture" }
          - { label: "Instagram", value: "Instagram" }
      - label: "Show as featured work"
        name: "featured"
        widget: "boolean"
        default: false
        required: false
        hint: "Turn this on if the image should be highlighted more prominently across the site."
      - label: "Use as hero candidate"
        name: "hero"
        widget: "boolean"
        default: false
        required: false
        hint: "Use this only for a very small number of images that should be eligible for the home hero."
      - label: "Available as print-ready work"
        name: "printReady"
        widget: "boolean"
        default: false
        required: false
        hint: "Turn this on for images that should support stronger print-focused messaging."
      - label: "Series"
        name: "series"
        widget: "string"
        required: false
        hint: "Optional grouping label for related works or travel chapters."
      - label: "Orientation"
        name: "orientation"
        widget: "select"
        required: false
        hint: "Helps with presentation and print guidance on the public site."
        options:
          - { label: "Landscape", value: "landscape" }
          - { label: "Portrait", value: "portrait" }
          - { label: "Square", value: "square" }
          - { label: "Panoramic", value: "panoramic" }
      - label: "Aspect ratio"
        name: "aspectRatio"
        widget: "string"
        required: false
        hint: "Optional note such as 3:2, 4:5, or panoramic."
      - label: "Suggested sizes"
        name: "sizes"
        widget: "list"
        required: false
        hint: "Optional public-facing size suggestions for this artwork."
        field: { label: "Size", name: "size", widget: "string" }
      - label: "Price guidance"
        name: "priceFrom"
        widget: "string"
        required: false
        hint: "Example: From 40 CHF or From 180 CHF."
      - label: "Edition"
        name: "edition"
        widget: "string"
        required: false
        hint: "Optional edition note, for example Open edition or Edition of 12."
      - label: "Availability"
        name: "availability"
        widget: "select"
        required: false
        default: "Available by inquiry"
        options:
          - { label: "Available by inquiry", value: "Available by inquiry" }
          - { label: "Selected sizes available", value: "Selected sizes available" }
          - { label: "Reserved", value: "Reserved" }
      - label: "Room mood"
        name: "roomMood"
        widget: "text"
        required: false
        hint: "Optional note describing the kind of space or atmosphere where the work fits best."
      - label: "Focus X"
        name: "focusX"
        widget: "number"
        value_type: "int"
        required: false
        min: 0
        max: 100
        hint: "Optional horizontal focal point for crops on the public site, from 0 to 100."
      - label: "Focus Y"
        name: "focusY"
        widget: "number"
        value_type: "int"
        required: false
        min: 0
        max: 100
        hint: "Optional vertical focal point for crops on the public site, from 0 to 100."
      - label: "Collection tags"
        name: "collectionTags"
        widget: "list"
        required: false
        hint: "Optional curated tags such as Best for large walls, Quiet interiors, Zurich, Romania, or Black and white."
        field: { label: "Tag", name: "tag", widget: "string" }
      - label: "Instagram or source link"
        name: "permalink"
        widget: "string"
        required: false
        hint: "Optional source URL, useful for Instagram imports or original post links."
      - label: "Date captured"
        name: "takenAt"
        widget: "datetime"
        required: false
        format: "YYYY-MM-DD"
        time_format: false
        date_format: "YYYY-MM-DD"
        hint: "Optional capture date shown in metadata when available."
      - label: "SEO title"
        name: "seoTitle"
        widget: "string"
        required: false
        hint: "Optional metadata for the artwork detail page."
      - label: "SEO description"
        name: "seoDescription"
        widget: "text"
        required: false
        hint: "Optional metadata description for the artwork detail page."
  - name: "siteContent"
    label: "Site Content"
    delete: false
    editor:
      preview: false
    files:
      - label: "Portfolio Experience"
        name: "portfolioExperience"
        file: "src/content/site/portfolioExperience.json"
        format: "json"
        fields:
          - { label: "Eyebrow", name: "eyebrow", widget: "string" }
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Description", name: "description", widget: "text" }
          - { label: "Archive Eyebrow", name: "archiveEyebrow", widget: "string" }
          - { label: "Archive Title", name: "archiveTitle", widget: "string" }
      - label: "Inquiry Guide"
        name: "inquiryGuide"
        file: "src/content/site/inquiryGuide.json"
        format: "json"
        fields:
          - { label: "Eyebrow", name: "eyebrow", widget: "string" }
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Description", name: "description", widget: "text" }
          - { label: "Guided Title", name: "guidedTitle", widget: "string" }
          - { label: "Guided Description", name: "guidedDescription", widget: "text" }
      - label: "Collector Experience"
        name: "collectorExperience"
        file: "src/content/site/collectorExperience.json"
        format: "json"
        fields:
          - { label: "Featured Eyebrow", name: "featuredEyebrow", widget: "string" }
          - { label: "Featured Title", name: "featuredTitle", widget: "string" }
          - { label: "Featured Description", name: "featuredDescription", widget: "text" }
          - { label: "Featured CTA Label", name: "featuredCtaLabel", widget: "string" }
          - { label: "Featured Secondary CTA Label", name: "featuredSecondaryCtaLabel", widget: "string" }
          - { label: "Assurance Eyebrow", name: "assuranceEyebrow", widget: "string" }
          - { label: "Assurance Title", name: "assuranceTitle", widget: "string" }
          - { label: "Assurance Description", name: "assuranceDescription", widget: "text" }
          - label: "Assurance Points"
            name: "assurancePoints"
            widget: "list"
            allow_add: true
            field: { label: "Point", name: "point", widget: "string" }
          - { label: "Journey Eyebrow", name: "journeyEyebrow", widget: "string" }
          - { label: "Journey Title", name: "journeyTitle", widget: "string" }
          - { label: "Journey Description", name: "journeyDescription", widget: "text" }
          - label: "Journey Steps"
            name: "journeySteps"
            widget: "list"
            summary: "{{fields.title}}"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }
      - label: "Consultation Experience"
        name: "consultationExperience"
        file: "src/content/site/consultationExperience.json"
        format: "json"
        fields:
          - { label: "Eyebrow", name: "eyebrow", widget: "string" }
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Description", name: "description", widget: "text" }
          - { label: "Guided Title", name: "guidedTitle", widget: "string" }
          - { label: "Guided Description", name: "guidedDescription", widget: "text" }
          - { label: "Assurance Title", name: "assuranceTitle", widget: "string" }
          - label: "Assurance Points"
            name: "assurancePoints"
            widget: "list"
            allow_add: true
            field: { label: "Point", name: "point", widget: "string" }
      - label: "Curation"
        name: "curation"
        file: "src/content/site/curation.json"
        format: "json"
        fields:
          - label: "Featured Print Titles"
            name: "featuredPrintTitles"
            widget: "list"
            required: false
            hint: "Choose and reorder the works that should appear in the featured print strip."
            summary: "{{fields.artworkTitle}}"
            field:
              label: "Artwork"
              name: "artworkTitle"
              widget: "relation"
              collection: "photos"
              search_fields: ["title", "location", "category"]
              value_field: "{{title}}"
              display_fields: ["title", "location", "category"]
          - label: "Featured Archive Titles"
            name: "featuredArchiveTitles"
            widget: "list"
            required: false
            hint: "Optional ordered works for the top of the main archive view. The list order becomes the gallery order."
            summary: "{{fields.artworkTitle}}"
            field:
              label: "Artwork"
              name: "artworkTitle"
              widget: "relation"
              collection: "photos"
              search_fields: ["title", "location", "category"]
              value_field: "{{title}}"
              display_fields: ["title", "location", "category"]
